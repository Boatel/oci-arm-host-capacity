name: Create OCI instance
on:
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist

      - name: Write private key and .env
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > /tmp/private_key.pem
          chmod 600 /tmp/private_key.pem
          cat > .env << EOF
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=/tmp/private_key.pem
          OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          OCI_OCPUS=${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS=${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE=${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES=${{ secrets.OCI_MAX_INSTANCES }}
          TELEGRAM_BOT_API_KEY=${{ secrets.TELEGRAM_BOT_API_KEY }}
          TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}
          EOF

      - name: Loop until instance created
        run: |
          while true; do
            output=$(php index.php 2>&1)
            echo "$output"
            if echo "$output" | grep -q "Out of host capacity\|InternalError\|NotAuthorizedOrNotFound\|TooManyRequests"; then
              echo "Retrying in 90s..."
              sleep 90
            else
              break
            fi
          done
